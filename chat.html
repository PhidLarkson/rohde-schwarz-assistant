<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rhoda — Lab Console</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #f5f6f8; --surface: #ffffff; --surface2: #eef0f4;
      --border: #d8dce6; --text: #1a1d2b; --dim: #6b7085;
      --cyan: #008c78; --cyan-light: #e6f7f4;
      --red: #c0392b; --red-light: #fdecea;
      --amber: #b8860b; --amber-light: #fff8e7;
      --blue: #2c5cc5; --blue-light: #eaf0ff;
      --purple: #7c3aed; --purple-light: #f3eeff;
      --mono: 'SF Mono', 'Cascadia Code', 'Consolas', 'Fira Code', monospace;
    }
    body { font-family: var(--mono); background: var(--bg); color: var(--text); height: 100vh; display: grid; grid-template-columns: 1fr 300px; grid-template-rows: 38px 1fr 52px; overflow: hidden; font-size: 12px; }

    /* ── Top bar ── */
    .topbar { grid-column: 1 / -1; background: var(--surface); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 14px; gap: 14px; font-size: 11px; }
    .topbar .logo { color: var(--cyan); font-weight: 700; font-size: 12px; letter-spacing: 1px; }
    .sep { color: var(--border); }
    .indicator { display: flex; align-items: center; gap: 4px; color: var(--dim); }
    .dot { width: 7px; height: 7px; border-radius: 50%; }
    .dot-on { background: #27ae60; box-shadow: 0 0 4px #27ae60; }
    .dot-off { background: #bbb; }
    .dot-warn { background: var(--amber); }
    .dot-err { background: var(--red); }
    .topbar-r { margin-left: auto; display: flex; gap: 8px; align-items: center; }
    .topbar a, .topbar button { background: none; border: 1px solid var(--border); color: var(--dim); padding: 2px 10px; border-radius: 3px; font-family: var(--mono); font-size: 10px; cursor: pointer; text-decoration: none; }
    .topbar a:hover, .topbar button:hover { color: var(--text); border-color: var(--dim); }

    /* ── Chat ── */
    .chat-pane { display: flex; flex-direction: column; overflow: hidden; border-right: 1px solid var(--border); }
    .messages { flex: 1; overflow-y: auto; padding: 10px 14px; background: var(--bg); }
    .messages::-webkit-scrollbar { width: 4px; }
    .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .msg { margin-bottom: 10px; }
    .msg-h { font-size: 10px; margin-bottom: 2px; display: flex; align-items: center; gap: 5px; }
    .msg-h .ts { color: var(--dim); }
    .msg-h .role { font-weight: 700; font-size: 10px; }
    .role-user { color: var(--blue); }
    .role-assistant { color: var(--cyan); }
    .role-system { color: var(--amber); }
    .role-tool { color: var(--purple); }
    .msg-body { line-height: 1.5; white-space: pre-wrap; word-break: break-word; color: var(--text); }
    .msg-body .sf { color: var(--red); font-weight: 700; }
    .tag { display: inline-block; font-size: 8px; padding: 1px 5px; border-radius: 2px; margin-left: 4px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.3px; }
    .tag-read { background: var(--cyan-light); color: var(--cyan); }
    .tag-write { background: var(--amber-light); color: var(--amber); }
    .tag-anomaly { background: var(--red-light); color: var(--red); }
    .tag-rag { background: var(--blue-light); color: var(--blue); }
    .tag-wf { background: var(--purple-light); color: var(--purple); }

    .confirm-bar { display: none; padding: 8px 14px; background: var(--amber-light); border-top: 1px solid #e8d5a0; font-size: 11px; color: var(--amber); }
    .confirm-bar.active { display: flex; align-items: center; gap: 10px; }
    .confirm-bar p { flex: 1; }
    .confirm-bar button { font-family: var(--mono); font-size: 11px; padding: 3px 14px; border: none; border-radius: 3px; cursor: pointer; font-weight: 700; }
    .btn-y { background: var(--cyan); color: #fff; }
    .btn-n { background: var(--red); color: #fff; }

    /* ── Input ── */
    .input-area { grid-column: 1; background: var(--surface); border-top: 1px solid var(--border); border-right: 1px solid var(--border); display: flex; padding: 8px 14px; gap: 8px; }
    #input { flex: 1; background: var(--bg); border: 1px solid var(--border); border-radius: 4px; padding: 8px 10px; color: var(--text); font-family: var(--mono); font-size: 12px; outline: none; }
    #input:focus { border-color: var(--cyan); }
    #input::placeholder { color: #aaa; }
    #send { background: var(--cyan); color: #fff; border: none; border-radius: 4px; padding: 8px 16px; font-family: var(--mono); font-size: 12px; font-weight: 700; cursor: pointer; }
    #send:disabled { opacity: 0.4; }

    /* ── Right panel ── */
    .panel { display: flex; flex-direction: column; overflow-y: auto; background: var(--surface); }
    .panel::-webkit-scrollbar { width: 4px; }
    .panel::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
    .psec { padding: 8px 12px; border-bottom: 1px solid var(--border); }
    .psec h3 { font-size: 9px; text-transform: uppercase; letter-spacing: 0.8px; color: var(--dim); margin-bottom: 6px; cursor: pointer; user-select: none; }
    .psec.collapsed .pc { display: none; }

    /* Scope state */
    .sg { display: grid; grid-template-columns: 1fr 1fr; gap: 2px 10px; font-size: 11px; }
    .sg .k { color: var(--dim); }
    .sg .v { text-align: right; font-weight: 600; }
    .sg .v-on { color: #27ae60; }
    .sg .v-off { color: var(--red); }
    .sg .v-na { color: #bbb; font-style: italic; font-weight: 400; }
    .scope-disconnected { color: var(--dim); font-size: 11px; font-style: italic; padding: 4px 0; }

    /* Anomaly */
    .anom { padding: 4px 0; border-bottom: 1px solid var(--border); font-size: 10px; }
    .anom:last-child { border: none; }
    .anom-cause { color: var(--text); }
    .anom-meta { color: var(--dim); font-size: 9px; }
    .anom-unsafe { color: var(--red); font-weight: 700; font-size: 9px; }

    /* Session log */
    .slogs { font-size: 9px; max-height: 180px; overflow-y: auto; }
    .sl { padding: 2px 0; display: flex; gap: 4px; }
    .sl-ts { color: var(--dim); flex-shrink: 0; }
    .sl-r { font-weight: 700; width: 10px; flex-shrink: 0; }
    .sl-r-U { color: var(--blue); }
    .sl-r-A { color: var(--cyan); }
    .sl-r-S { color: var(--amber); }
    .sl-r-T { color: var(--purple); }
    .sl-c { color: var(--dim); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    /* Workflow */
    .wf-btn { display: block; width: 100%; padding: 5px 8px; margin-bottom: 3px; background: var(--bg); border: 1px solid var(--border); border-radius: 3px; color: var(--text); font-family: var(--mono); font-size: 10px; text-align: left; cursor: pointer; }
    .wf-btn:hover { border-color: var(--cyan); }
    .wf-cat { font-size: 8px; float: right; font-weight: 700; }
    .cat-s { color: var(--cyan); }
    .cat-x { color: var(--red); }
    .ws { font-size: 10px; padding: 2px 0; display: flex; gap: 4px; }
    .ws-n { color: var(--dim); width: 14px; text-align: right; flex-shrink: 0; }
    .ws-n.act { color: var(--cyan); font-weight: 700; }
    .ws-t { color: var(--dim); }
    .ws-t.act { color: var(--text); font-weight: 600; }
    .ws-t.done { text-decoration: line-through; }

    /* Progress */
    .pr { margin-bottom: 4px; }
    .pr-l { display: flex; justify-content: space-between; font-size: 9px; color: var(--dim); }
    .pr-b { height: 3px; background: var(--border); border-radius: 1px; margin-top: 2px; }
    .pr-f { height: 100%; background: var(--cyan); border-radius: 1px; }

    @media (max-width: 800px) { body { grid-template-columns: 1fr; } .panel { display: none; } .input-area { border-right: none; } }
  </style>
</head>
<body>
  <div class="topbar">
    <span class="logo">RHODA</span>
    <span class="sep">|</span>
    <div class="indicator"><div class="dot dot-off" id="dot-be"></div><span id="lbl-be">backend: checking...</span></div>
    <span class="sep">|</span>
    <div class="indicator"><div class="dot dot-off" id="dot-hw"></div><span id="lbl-hw">instrument: —</span></div>
    <div class="topbar-r">
      <a href="/" target="_blank" id="link-xr">open XR view</a>
      <a href="/instructor.html" target="_blank">instructor</a>
      <button id="btn-export">export</button>
      <button id="btn-clear">clear</button>
    </div>
  </div>

  <div class="chat-pane">
    <div class="messages" id="messages"></div>
    <div class="confirm-bar" id="confirm-bar">
      <p id="confirm-text"></p>
      <button class="btn-y" id="btn-y">CONFIRM</button>
      <button class="btn-n" id="btn-n">DENY</button>
    </div>
  </div>

  <div class="panel">
    <div class="psec">
      <h3>INSTRUMENT</h3>
      <div class="pc" id="scope-panel"><div class="scope-disconnected">checking backend...</div></div>
    </div>
    <div class="psec">
      <h3>WORKFLOWS</h3>
      <div class="pc">
        <button class="wf-btn" data-wf="measure-1khz-sine">measure 1kHz sine <span class="wf-cat cat-s">simple</span></button>
        <button class="wf-btn" data-wf="safety-overvoltage">overvoltage safety <span class="wf-cat cat-x">safety</span></button>
        <div id="wf-steps"></div>
      </div>
    </div>
    <div class="psec">
      <h3>ANOMALIES</h3>
      <div class="pc" id="anom-panel"><div style="font-size:10px;color:var(--dim)">none</div></div>
    </div>
    <div class="psec">
      <h3>PROGRESS</h3>
      <div class="pc" id="prog-panel"></div>
    </div>
    <div class="psec">
      <h3>SESSION LOG</h3>
      <div class="pc"><div class="slogs" id="slog-panel"></div></div>
    </div>
  </div>

  <div class="input-area">
    <input type="text" id="input" placeholder="ask about procedures, troubleshooting, instrument control..." autocomplete="off" spellcheck="false" />
    <button id="send">SEND</button>
  </div>

  <script type="module" src="/src/chat.ts"></script>
</body>
</html>
