<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rhoda — Virtual Lab Assistant Chat</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --border: #30363d;
      --text: #e6edf3;
      --muted: #8b949e;
      --accent: #00d4aa;
      --accent-dim: #00d4aa33;
      --danger: #f85149;
      --warn: #d29922;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
    }
    /* Sidebar */
    .sidebar {
      width: 280px;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
    }
    .sidebar-header {
      padding: 16px;
      border-bottom: 1px solid var(--border);
    }
    .sidebar-header h1 {
      font-size: 18px;
      color: var(--accent);
    }
    .sidebar-header p {
      font-size: 12px;
      color: var(--muted);
      margin-top: 4px;
    }
    .sidebar-section {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
    }
    .sidebar-section h3 {
      font-size: 11px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 8px;
      letter-spacing: 0.5px;
    }
    .workflow-btn {
      display: block;
      width: 100%;
      padding: 10px 12px;
      margin-bottom: 6px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-size: 13px;
      text-align: left;
      cursor: pointer;
      transition: border-color 0.2s;
    }
    .workflow-btn:hover { border-color: var(--accent); }
    .workflow-btn .badge {
      display: inline-block;
      font-size: 10px;
      padding: 2px 6px;
      border-radius: 3px;
      margin-left: 4px;
    }
    .badge-simple { background: var(--accent-dim); color: var(--accent); }
    .badge-safety { background: #f8514933; color: var(--danger); }
    /* Instrument state */
    .instrument-panel {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .instrument-panel h3 {
      font-size: 11px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 8px;
    }
    #instrument-state {
      font-family: 'SF Mono', 'Consolas', monospace;
      font-size: 11px;
      color: var(--muted);
      line-height: 1.5;
    }
    .state-row { display: flex; justify-content: space-between; }
    .state-label { color: var(--muted); }
    .state-value { color: var(--text); }
    /* Progress */
    .progress-panel { padding: 12px 16px; flex: 1; overflow-y: auto; }
    .progress-panel h3 {
      font-size: 11px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 8px;
    }
    .topic-bar {
      margin-bottom: 6px;
    }
    .topic-bar .label {
      font-size: 11px;
      color: var(--muted);
      display: flex;
      justify-content: space-between;
    }
    .topic-bar .bar {
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      margin-top: 2px;
    }
    .topic-bar .fill {
      height: 100%;
      background: var(--accent);
      border-radius: 2px;
      transition: width 0.3s;
    }
    /* Sidebar footer */
    .sidebar-footer {
      padding: 12px 16px;
      border-top: 1px solid var(--border);
      margin-top: auto;
    }
    .sidebar-footer button {
      width: 100%;
      padding: 8px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--muted);
      font-size: 12px;
      cursor: pointer;
      margin-bottom: 4px;
    }
    .sidebar-footer button:hover { color: var(--text); border-color: var(--accent); }
    /* Chat area */
    .chat-area {
      flex: 1;
      display: flex;
      flex-direction: column;
    }
    .chat-header {
      padding: 12px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--accent);
    }
    .chat-header span { font-size: 14px; color: var(--muted); }
    #workflow-status {
      margin-left: auto;
      font-size: 12px;
      color: var(--accent);
    }
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
    }
    .message {
      max-width: 720px;
      margin: 0 auto 16px;
      display: flex;
      gap: 12px;
    }
    .msg-avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
    }
    .msg-user .msg-avatar { background: #30363d; }
    .msg-assistant .msg-avatar { background: var(--accent-dim); color: var(--accent); }
    .msg-system .msg-avatar { background: #d2992233; color: var(--warn); }
    .msg-content {
      flex: 1;
      font-size: 14px;
      line-height: 1.6;
    }
    .msg-content p { margin-bottom: 8px; }
    .msg-content p:last-child { margin-bottom: 0; }
    .msg-role {
      font-size: 12px;
      font-weight: 600;
      margin-bottom: 4px;
    }
    .msg-user .msg-role { color: var(--muted); }
    .msg-assistant .msg-role { color: var(--accent); }
    .msg-system .msg-role { color: var(--warn); }
    /* Confirmation bar */
    .confirm-bar {
      display: none;
      max-width: 720px;
      margin: 0 auto 16px;
      padding: 12px 16px;
      background: #d2992222;
      border: 1px solid var(--warn);
      border-radius: 8px;
    }
    .confirm-bar.visible { display: flex; align-items: center; gap: 12px; }
    .confirm-bar p { flex: 1; font-size: 13px; color: var(--warn); }
    .confirm-bar button {
      padding: 6px 16px;
      border-radius: 4px;
      border: none;
      font-size: 13px;
      cursor: pointer;
      font-weight: 600;
    }
    .btn-confirm { background: var(--accent); color: #000; }
    .btn-deny { background: var(--danger); color: #fff; }
    /* Input area */
    .input-area {
      padding: 16px 20px;
      border-top: 1px solid var(--border);
      background: var(--surface);
    }
    .input-row {
      max-width: 720px;
      margin: 0 auto;
      display: flex;
      gap: 8px;
    }
    #chat-input {
      flex: 1;
      padding: 10px 14px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 14px;
      outline: none;
    }
    #chat-input:focus { border-color: var(--accent); }
    #chat-input::placeholder { color: var(--muted); }
    #send-btn {
      padding: 10px 20px;
      background: var(--accent);
      color: #000;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }
    #send-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    @media (max-width: 768px) {
      .sidebar { display: none; }
    }
  </style>
</head>
<body>
  <aside class="sidebar">
    <div class="sidebar-header">
      <h1>Rhoda</h1>
      <p>R&S Virtual Lab Assistant</p>
    </div>
    <div class="sidebar-section">
      <h3>Guided Workflows</h3>
      <button class="workflow-btn" data-workflow="measure-1khz-sine">
        Measure 1 kHz Sine <span class="badge badge-simple">Simple</span>
      </button>
      <button class="workflow-btn" data-workflow="safety-overvoltage">
        Overvoltage Safety <span class="badge badge-safety">Safety</span>
      </button>
    </div>
    <div class="instrument-panel">
      <h3>Oscilloscope State</h3>
      <div id="instrument-state">Loading...</div>
    </div>
    <div class="progress-panel">
      <h3>Session Progress</h3>
      <div id="progress-bars"></div>
    </div>
    <div class="sidebar-footer">
      <button id="btn-export">Export Transcript</button>
      <button id="btn-instructor" onclick="window.open('/instructor.html','_blank')">Instructor View</button>
    </div>
  </aside>
  <main class="chat-area">
    <div class="chat-header">
      <div class="status-dot"></div>
      <span>Rhoda is online</span>
      <span id="workflow-status"></span>
    </div>
    <div class="messages" id="messages"></div>
    <div class="confirm-bar" id="confirm-bar">
      <p id="confirm-text"></p>
      <button class="btn-confirm" id="btn-confirm-yes">Confirm</button>
      <button class="btn-deny" id="btn-confirm-no">Deny</button>
    </div>
    <div class="input-area">
      <div class="input-row">
        <input type="text" id="chat-input" placeholder="Ask Rhoda about oscilloscope procedures, safety, or troubleshooting..." autocomplete="off" />
        <button id="send-btn">Send</button>
      </div>
    </div>
  </main>
  <script type="module" src="/src/chat.ts"></script>
</body>
</html>
